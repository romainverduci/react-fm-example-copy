apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
    inputs:
      flag_name:
        type: string
        required: true
      replacement_value:
        type: string
        required: true
      repository_url:
        type: string
        required: true
jobs:
  build:
    steps:
      - name: Print inputs                   
        uses: docker://alpine:3.18
        shell: sh                                                                                                                                                 
        run: |
          echo "flag_name: ${{ inputs.flag_name }}"                                                                                                               
          echo "replacement_value: ${{ inputs.replacement_value }}"
          echo "repository_url: ${{ inputs.repository_url }}"
